# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 expects a current Node LTS (Netlify’s default can be too old).
  NODE_VERSION = "22"

# React Router (client-side routes): serve index.html for deep links and refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
